<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BINGÃO DO PANKADÃO</title>
    <script src="https://bingao-do-pankadao.onrender.com/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 10px; }
        #topo { background: #333; color: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        h1 { margin: 10px 0; font-size: 24px; }
        #display-ultima { font-size: 28px; font-weight: bold; border: 3px solid white; padding: 5px 15px; display: inline-block; }
        
        #login-container { display: block; padding: 20px; }
        #config-container { background: #e0e0e0; padding: 10px; margin: 10px 0; border-radius: 5px; font-weight: bold; display: none; }
        
        /* ORGANIZAÇÃO EM COLUNA ÚNICA (UMA EMBAIXO DA OUTRA) */
        #container-cartelas { display: flex; flex-direction: column; align-items: center; gap: 15px; max-width: 400px; margin: 0 auto; }
        
        /* LARGURA TOTAL PARA O CELULAR */
        .cartela-mini { border: 3px solid black; background: white; padding: 8px; width: 100%; max-width: 360px; box-sizing: border-box; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        
        /* NÚMEROS GRANDES PARA LEITURA RÁPIDA */
        .celula { height: 45px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; background: #fff; }
        .cabecalho { background: black; color: white; text-align: center; font-weight: bold; padding: 6px 0; font-size: 16px; }
        .marcado { background: #ffcc00 !important; color: black; }
    </style>
</head>
<body>

    <div id="topo">
        <h1>BINGÃO DO PANKADÃO</h1>
        <div id="display-ultima">--</div>
    </div>

    <div id="login-container">
        <input type="text" id="tel" placeholder="Seu Telefone">
        <button onclick="registrar()">Conectar e Buscar Cartelas</button>
    </div>

    <div id="config-container">
        <label>
            <input type="checkbox" id="autoCheck" checked onchange="renderizar()"> Marcação Automática
        </label>
    </div>

    <div id="container-cartelas"></div>

    <script>
        const socket = io("https://bingao-do-pankadao.onrender.com");
        let meusNumeros = [];
        let sorteados = [];

        function registrar() {
            const tel = document.getElementById('tel').value;
            if(tel) {
                // Envia o sinal para o servidor buscar no relatório
                socket.emit('registrarCliente', tel);
            }
        }

        // Resposta do servidor com as cartelas encontradas
        socket.on('minhasCartelas', (cartelas) => {
            meusNumeros = cartelas;
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('config-container').style.display = 'block';
            renderizar();
        });

        socket.on('historicoSorteios', (lista) => { sorteados = lista; renderizar(); });
        
        socket.on('novoNumero', (num) => {
            sorteados.push(num);
            document.getElementById('display-ultima').innerText = converterParaBingo(num);
            renderizar();
        });

        function converterParaBingo(num) {
            const l = num <= 15 ? 'B' : num <= 30 ? 'I' : num <= 45 ? 'N' : num <= 60 ? 'G' : 'O';
            return l + ' ' + num;
        }

        function renderizar() {
            const container = document.getElementById('container-cartelas');
            const auto = document.getElementById('autoCheck').checked;
            container.innerHTML = '';
            
            meusNumeros.forEach(c => {
                let html = '<div class="cartela-mini"><div class="grid">';
                ['B', 'I', 'N', 'G', 'O'].forEach(l => html += `<div class="cabecalho">${l}</div>`);
                
                c.forEach(num => {
                    const isMarcado = auto && sorteados.includes(num);
                    const classe = isMarcado ? 'celula marcado' : 'celula';
                    html += `<div class="${classe}">${num}</div>`;
                });
                
                html += '</div></div>';
                container.innerHTML += html;
            });
        }
        
        socket.on('reiniciar', () => location.reload());
    </script>
</body>
</html>
